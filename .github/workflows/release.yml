name: Create Portal Release


on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'true'
          ref: main

      - name: Use Latest Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Portal
        run: |
          make
          mkdir -p upload
          # Move any build artifacts you want to release into upload/
          # Example: mv Portal/build/Release-iphoneos/*.ipa upload/ || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Portal latest
          tag_name: latest
          files: |
            upload/*
          generate_release_notes: true
          fail_on_unmatched_files: false
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
